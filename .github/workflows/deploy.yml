name: Deploy Web App to VM

on:
  workflow_run:
    workflows: ["Build and publish Web App image (GHCR)"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-orio-web-app
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (pull + restart web)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            cd ~/orio/deploy
            docker-compose pull web
            docker stop orio-web || true
            docker rm orio-web || true
            docker-compose up -d --no-deps web
