# TLS certs come from the host via docker-compose: mount /etc/letsencrypt read-only.
# First-time: on the VM, stop the web container briefly and run:
#   sudo certbot certonly --standalone -d smeedai.com -d www.smeedai.com
# Then start the stack with this image + compose (ports 80/443 + letsencrypt volume).

server {
  listen 80;
  server_name smeedai.com www.smeedai.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name smeedai.com www.smeedai.com;

  ssl_certificate     /etc/letsencrypt/live/smeedai.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/smeedai.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://orio-api:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
